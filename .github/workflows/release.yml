name: Release

# Triggered when you push a version tag like v1.0.1
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # lets the Action create/publish the GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # Build the installer + portable + latest.yml, but do NOT let
      # electron-builder publish (its GitHub publish step is unreliable).
      - name: Build (no publish)
        run: npx electron-builder --win --x64 --publish never

      # Create a PUBLISHED GitHub Release for this tag and attach the real files.
      # This reliably uploads the installer, portable exe, blockmap, and latest.yml
      # (latest.yml is what the app's auto-updater reads).
      - name: Publish GitHub Release with installers
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
